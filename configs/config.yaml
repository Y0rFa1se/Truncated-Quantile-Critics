env_id: "LunarLanderContinuous-v3"

run:
  project_name: "truncated-quantile-critics"
  run_name: "tqc_test_run"

network:
  state_dim: 8
  action_dim: 2
  policy_hidden_dim: 256
  critic_hidden_dim: 256
  critic_num: 5
  quantile_num: 25
  log_alpha: 0.0

training:
  drop_k: 10
  kappa: 1.0
  gamma: 0.95
  tau: 0.005
  target_entropy: null

  policy_lr: 1e-4
  critic_lr: 1e-4
  log_alpha_lr: 1e-4

  max_buffer_size: 1e6
  batch_size: 256

  start_steps: 1000
  sample_per_epoch: 1000
  total_episodes: 1000
  max_steps_per_episode: 1000